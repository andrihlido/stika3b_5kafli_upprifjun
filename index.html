<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stika 3b – Kafli 5: Mælingar – Upprifjun</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --primary-dark: #1d4ed8;
  --accent: #f59e0b;
  --accent-light: #fef3c7;
  --success: #10b981;
  --success-light: #d1fae5;
  --error: #ef4444;
  --error-light: #fee2e2;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --cat1: #3b82f6;
  --cat2: #8b5cf6;
  --cat3: #06b6d4;
  --cat4: #10b981;
  --cat5: #f59e0b;
  --cat6: #ef4444;
  --cat7: #ec4899;
  --cat8: #6366f1;
  --cat9: #14b8a6;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.hero {
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
  color: white;
  padding: 3rem 1.5rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 30%, rgba(255,255,255,0.06) 0%, transparent 50%);
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-2%, 2%) rotate(1deg); }
}

.hero h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem, 5vw, 3rem);
  margin-bottom: 0.3rem;
  position: relative;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.hero p {
  font-size: 1.1rem;
  opacity: 0.9;
  position: relative;
}

.hero .subtitle {
  font-weight: 700;
  font-size: 1.3rem;
  margin-top: 0.2rem;
  opacity: 1;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* Score bar */
.score-bar {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  position: sticky;
  top: 0.5rem;
  z-index: 50;
}

.score-bar .label {
  font-weight: 700;
  color: var(--text-light);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.score-bar .score {
  font-family: 'Fredoka One', cursive;
  font-size: 1.5rem;
  color: var(--primary);
}

.score-bar .bar-wrap {
  flex: 1;
  min-width: 120px;
  height: 10px;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}

.score-bar .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 5px;
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  width: 0%;
}

.score-bar .reset-btn {
  background: var(--error-light);
  color: var(--error);
  border: none;
  padding: 0.4rem 1rem;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}

.score-bar .reset-btn:hover {
  background: var(--error);
  color: white;
}

/* Category grid */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.cat-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  border-left: 5px solid var(--cat-color, var(--primary));
  position: relative;
  overflow: hidden;
}

.cat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.cat-card .cat-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.cat-card h3 {
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}

.cat-card .cat-desc {
  font-size: 0.85rem;
  color: var(--text-light);
}

.cat-card .cat-progress {
  margin-top: 0.8rem;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.cat-card .cat-progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s;
  width: 0%;
}

.cat-card .cat-count {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 0.4rem;
  font-weight: 600;
}

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--card);
  border: 2px solid var(--border);
  padding: 0.5rem 1.2rem;
  border-radius: var(--radius-sm);
  font-weight: 700;
  cursor: pointer;
  font-size: 0.95rem;
  color: var(--text);
  transition: all 0.2s;
  margin-bottom: 1rem;
}

.back-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Concept box */
.concept-box {
  background: linear-gradient(135deg, var(--primary-light) 0%, #ede9fe 100%);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 2px solid rgba(37, 99, 235, 0.15);
}

.concept-box h3 {
  font-family: 'Fredoka One', cursive;
  color: var(--primary-dark);
  margin-bottom: 0.6rem;
  font-size: 1.2rem;
}

.concept-box .formula {
  background: white;
  border-radius: var(--radius-sm);
  padding: 0.8rem 1.2rem;
  margin: 0.5rem 0;
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  color: var(--primary-dark);
  border: 2px dashed rgba(37, 99, 235, 0.2);
}

.concept-box p, .concept-box li {
  font-size: 0.95rem;
  color: #334155;
}

.concept-box ul {
  padding-left: 1.2rem;
  margin-top: 0.4rem;
}

/* Exercise card */
.exercise-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
  overflow: hidden;
  transition: all 0.3s;
}

.exercise-header {
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  transition: background 0.2s;
}

.exercise-header:hover {
  background: #f8fafc;
}

.exercise-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85rem;
  color: white;
  flex-shrink: 0;
}

.exercise-title {
  flex: 1;
  font-weight: 700;
  font-size: 0.95rem;
}

.exercise-status {
  font-size: 1.2rem;
}

.exercise-body {
  display: none;
  padding: 0 1.5rem 1.5rem;
}

.exercise-body.open {
  display: block;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.exercise-question {
  font-size: 1rem;
  margin-bottom: 1rem;
  line-height: 1.7;
  color: #334155;
}

.exercise-question strong {
  color: var(--text);
}

.input-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 0.8rem;
}

.input-row label {
  font-weight: 700;
  font-size: 0.9rem;
  min-width: 30px;
}

.answer-input {
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.6rem 1rem;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  width: 140px;
  transition: border-color 0.2s;
  outline: none;
}

.answer-input:focus {
  border-color: var(--primary);
}

.answer-input.correct {
  border-color: var(--success);
  background: var(--success-light);
}

.answer-input.wrong {
  border-color: var(--error);
  background: var(--error-light);
}

.unit-label {
  font-size: 0.9rem;
  color: var(--text-light);
  font-weight: 600;
}

.btn-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.8rem;
}

.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 0.6rem 1.2rem;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
}

.btn-check {
  background: var(--primary);
  color: white;
}

.btn-check:hover { background: var(--primary-dark); }

.btn-hint {
  background: var(--accent-light);
  color: #92400e;
}

.btn-hint:hover { background: #fde68a; }

.btn-next {
  background: var(--success-light);
  color: #065f46;
}

.btn-next:hover { background: #a7f3d0; }

/* Feedback */
.feedback {
  margin-top: 1rem;
  border-radius: var(--radius-sm);
  padding: 1rem 1.2rem;
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
}

.feedback.show { display: block; animation: slideDown 0.3s ease; }

.feedback.correct {
  background: var(--success-light);
  border: 2px solid #6ee7b7;
  color: #065f46;
}

.feedback.wrong {
  background: var(--error-light);
  border: 2px solid #fca5a5;
  color: #991b1b;
}

.feedback .fb-title {
  font-weight: 800;
  margin-bottom: 0.3rem;
}

.hint-box {
  margin-top: 0.8rem;
  background: var(--accent-light);
  border: 2px solid #fcd34d;
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  font-size: 0.9rem;
  color: #78350f;
  display: none;
}

.hint-box.show { display: block; animation: slideDown 0.3s ease; }

.hint-box .hint-title {
  font-weight: 800;
  margin-bottom: 0.2rem;
}

/* Glossary tooltip */
.glossary-term {
  text-decoration: underline dotted;
  text-decoration-color: var(--primary);
  text-underline-offset: 3px;
  cursor: help;
  color: var(--primary-dark);
  font-weight: 700;
  position: relative;
}

.glossary-popup {
  display: none;
  position: fixed;
  background: #1e293b;
  color: white;
  padding: 0.8rem 1.1rem;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  max-width: 320px;
  z-index: 999;
  box-shadow: var(--shadow-lg);
  line-height: 1.5;
  font-weight: 600;
  pointer-events: none;
}

.glossary-popup.show { display: block; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.difficulty {
  display: inline-block;
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-weight: 700;
  margin-left: 0.5rem;
  vertical-align: middle;
}

.diff-easy { background: #d1fae5; color: #065f46; }
.diff-medium { background: #fef3c7; color: #92400e; }
.diff-hard { background: #fee2e2; color: #991b1b; }

.hidden { display: none !important; }

/* Responsive */
@media (max-width: 600px) {
  .cat-grid { grid-template-columns: 1fr; }
  .score-bar { flex-direction: column; align-items: stretch; text-align: center; }
  .score-bar .bar-wrap { width: 100%; }
  .answer-input { width: 110px; }
}
</style>
</head>

<div class="hero">
  <h1>📐 Mælingar</h1>
  <p class="subtitle">Stika 3b – Kafli 5</p>
  <p>Æfðu þig og rifjaðu upp helstu hugtök og aðferðir</p>
</div>

<div class="container">

  <div class="score-bar">
    <div>
      <div class="label">Framvinda</div>

    <div class="bar-wrap">
      <div class="bar-fill" id="scoreBar"></div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Byrja aftur</button>

  <!-- MAIN MENU -->
  <div id="mainMenu">
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- CATEGORY VIEW -->
  <div id="catView" class="hidden">
    <button class="back-btn" onclick="goBack()">← Til baka</button>

</div>

<script>

const glossary = {

// ============== STATE ==============
let state = {
  correct: new Set(),
  attempted: new Set(),
  currentCat: null
};

const totalExercises = categories.reduce((s, c) => s + c.exercises.length, 0);

function updateScore() {
  const c = state.correct.size;
  const a = state.attempted.size;
  document.getElementById('scoreText').textContent = `${c} / ${totalExercises}`;
  document.getElementById('scoreBar').style.width = `${(c / totalExercises) * 100}%`;
  // Update category progress
  document.querySelectorAll('.cat-card').forEach(card => {
    const catId = card.dataset.cat;
    const cat = categories.find(c => c.id === catId);
    if (!cat) return;
    let done = 0;
    cat.exercises.forEach((_, i) => {
      if (state.correct.has(`${catId}-${i}`)) done++;
    });
    const fill = card.querySelector('.cat-progress-fill');
    const count = card.querySelector('.cat-count');
    if (fill) fill.style.width = `${(done / cat.exercises.length) * 100}%`;
    if (count) count.textContent = `${done} af ${cat.exercises.length} rétt`;
  });
}

function resetAll() {
  if (!confirm('Ertu viss? Öll framvinda eyðist.')) return;
  state.correct.clear();
  state.attempted.clear();
  updateScore();
  document.querySelectorAll('.answer-input').forEach(inp => {
    inp.value = '';
    inp.className = 'answer-input';
  });
  document.querySelectorAll('.feedback').forEach(f => f.classList.remove('show'));
  document.querySelectorAll('.hint-box').forEach(h => h.classList.remove('show'));
  document.querySelectorAll('.exercise-status').forEach(s => s.textContent = '');
}

// ============== RENDER ==============

function renderMenu() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.cat = cat.id;
    card.style.setProperty('--cat-color', cat.color);
    card.style.borderLeftColor = cat.color;
    card.innerHTML = `
      <div class="cat-icon">${cat.icon}</div>
      <h3>${cat.title}</h3>
      <div class="cat-desc">${cat.desc}</div>
      <div class="cat-progress"><div class="cat-progress-fill" style="background:${cat.color}"></div></div>
      <div class="cat-count">0 af ${cat.exercises.length} rétt</div>
    `;
    card.addEventListener('click', () => openCategory(cat.id));
    grid.appendChild(card);
  });
}

function openCategory(catId) {
  state.currentCat = catId;
  const cat = categories.find(c => c.id === catId);
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('catView').classList.remove('hidden');

  const content = document.getElementById('catContent');
  let html = '';

  // Concept box
  const c = cat.concept;
  html += `<div class="concept-box">
    <h3>${c.title}</h3>
    ${c.formulas.map(f => `<div class="formula">${f}</div>`).join('')}
    <p style="margin-top:0.6rem">${c.text}</p>
  </div>`;

  // Exercises
  cat.exercises.forEach((ex, i) => {
    const eid = `${catId}-${i}`;
    const isDone = state.correct.has(eid);
    const diffLabel = ex.diff === 'easy' ? 'Auðvelt' : ex.diff === 'medium' ? 'Miðlungs' : 'Krefjandi';
    const diffClass = `diff-${ex.diff}`;

    html += `<div class="exercise-card" id="ex-${eid}">
      <div class="exercise-header" onclick="toggleExercise('${eid}')">
        <div class="exercise-num" style="background:${cat.color}">${i + 1}</div>
        <div class="exercise-title">Dæmi ${i + 1} <span class="difficulty ${diffClass}">${diffLabel}</span></div>
        <div class="exercise-status" id="status-${eid}">${isDone ? '✅' : ''}</div>
      </div>
      <div class="exercise-body" id="body-${eid}">
        <div class="exercise-question">${ex.q}</div>
        ${ex.inputs.map((inp, j) => `
          <div class="input-row">
            <label>${inp.label}</label>
            <input class="answer-input" id="input-${eid}-${j}"
              type="${ex.textMode ? 'text' : 'number'}"
              step="any" placeholder="?"
              ${ex.textMode ? '' : 'inputmode="decimal"'}
              onkeydown="if(event.key==='Enter')checkAnswer('${eid}')">
            <span class="unit-label">${inp.unit}</span>
          </div>
        `).join('')}
        <div class="btn-row">
          <button class="btn btn-check" onclick="checkAnswer('${eid}')">Athuga ✓</button>
          <button class="btn btn-hint" onclick="showHint('${eid}')">💡 Vísbending</button>
        </div>
        <div class="hint-box" id="hint-${eid}">
          <div class="hint-title">💡 Vísbending</div>
          ${ex.hint}
        </div>
        <div class="feedback" id="fb-${eid}"></div>
      </div>
    </div>`;
  });

  content.innerHTML = html;
  attachGlossary();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  document.getElementById('catView').classList.add('hidden');
  document.getElementById('mainMenu').classList.remove('hidden');
  state.currentCat = null;
  updateScore();
}

function toggleExercise(eid) {
  const body = document.getElementById(`body-${eid}`);
  body.classList.toggle('open');
}

function showHint(eid) {
  document.getElementById(`hint-${eid}`).classList.add('show');
}

function parseNum(str) {
  // Accept both comma and dot as decimal separator
  return parseFloat(str.replace(',', '.'));
}

function checkAnswer(eid) {
  const [catId, idx] = eid.split('-');
  const cat = categories.find(c => c.id === catId);
  const ex = cat.exercises[parseInt(idx)];
  const fb = document.getElementById(`fb-${eid}`);

  let allCorrect = true;
  ex.inputs.forEach((inp, j) => {
    const inputEl = document.getElementById(`input-${eid}-${j}`);
    const val = inputEl.value.trim();
    const expected = ex.answers[j];

    let isCorrect = false;
    if (ex.textMode) {
      isCorrect = val.toLowerCase() === String(expected).toLowerCase();
    } else {
      const numVal = parseNum(val);
      isCorrect = Math.abs(numVal - expected) < 0.05;
    }

    inputEl.classList.remove('correct', 'wrong');
    inputEl.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) allCorrect = false;
  });

  state.attempted.add(eid);

  if (allCorrect) {
    state.correct.add(eid);
    document.getElementById(`status-${eid}`).textContent = '✅';
    fb.className = 'feedback correct show';
    fb.innerHTML = `<div class="fb-title">🎉 Rétt!</div>${ex.explain}`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<div class="fb-title">❌ Ekki alveg rétt – reyndu aftur!</div><div style="margin-top:0.4rem"><strong>Aðferð:</strong> ${ex.explain}</div>`;
  }
  updateScore();
}

// ============== GLOSSARY ==============

function attachGlossary() {
  document.querySelectorAll('.glossary-term').forEach(el => {
    const term = el.dataset.term;
    if (!term || !glossary[term]) return;
    el.addEventListener('mouseenter', e => {
      const popup = document.getElementById('glossaryPopup');
      popup.textContent = glossary[term];
      popup.classList.add('show');
      const rect = el.getBoundingClientRect();
      let top = rect.bottom + 8;
      let left = rect.left;
      if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
      if (left < 10) left = 10;
      if (top + 100 > window.innerHeight) top = rect.top - 60;
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
    });
    el.addEventListener('mouseleave', () => {
      document.getElementById('glossaryPopup').classList.remove('show');
    });
    el.addEventListener('click', e => {
      const popup = document.getElementById('glossaryPopup');
      if (popup.classList.contains('show')) {
        popup.classList.remove('show');
      } else {
        popup.textContent = glossary[term];
        popup.classList.add('show');
        const rect = el.getBoundingClientRect();
        popup.style.top = (rect.bottom + 8) + 'px';
        popup.style.left = Math.min(rect.left, window.innerWidth - 330) + 'px';
        setTimeout(() => popup.classList.remove('show'), 4000);
      }
    });
  });
}

// ============== INIT ==============
renderMenu();
updateScore();
attachGlossary();
</script>
</body>
</html>
